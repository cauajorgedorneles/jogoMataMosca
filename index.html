<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mata Mosquito!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">

    <script>
        
        function inciarJogo(){
            var nivel = document.getElementById('nivel').value

            if(nivel === ''){
                alert('Selecione o nível de dificuldade para iniciar o jogo!')
                return false //finalizar a lógica
            }

            window.location.href = 'app.html?' + nivel
        }   
    </script>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="colum">
                <div class="d-flex justify-content-center">
                    <img src="imagens/game.png" alt="">
                </div>
                
            </div>
        </div>

        <div class="row">
            <div class="colum">
                <div class="d-flex justify-content-center">
                    <div class="mb-2">
                        <select class="form-control" id="nivel">
                            <option value="">--- Selecione o nível ---</option>
                            <option value="lerdao">Nível Lerdão</option>
                            <option value="normal">Nível Normal</option>
                            <option value="trem-bala">Nível Trem Bala</option>
                        </select>
                    </div>
                    
                </div         
            </div>
        </div>

        <div class="row">
            <div class="colum">
                <div class="d-flex justify-content-center">
                    <button type="button" class="btn btn-danger btn-lg" onclick="inciarJogo()">Iniciar Jogo</button>
                </div         
            </div>
        </div>
    </div>
</body>
</html>
